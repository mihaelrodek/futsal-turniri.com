<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo/mark-green.svg" />
    <!-- Apple touch icon - 180x180 PNG with white padding so iOS doesn't
         clip the suits when it rounds the corners on the home screen. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b6b3a" />

    <!-- Pitch theme typography triad:
           • Inter      - body/UI text
           • Bricolage  - display headings, team names, big numerics
           • JetBrains  - mono labels, scoreboards, clocks
         All loaded from Google Fonts with display=swap so first paint
         never blocks on the font; the theme falls back to the system
         stack while it loads (and permanently, offline). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm up the connections the app reaches for early: CARTO map tiles
         (/karta), Firebase Auth + Google Identity (login). Saves the DNS +
         TLS handshake when the user first hits those features. -->
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />

    <!-- Kick off the upcoming-tournaments request during HTML parse, before
         the JS bundle has even downloaded. Combined with the short
         Cache-Control the API sends, axios's later XHR for the same URL is
         served straight from the browser cache → the list paints instantly.
         Fire-and-forget; errors are irrelevant here (the app retries). -->
    <script>
      try { fetch("/api/tournaments?status=upcoming").catch(function(){}); } catch (e) {}
    </script>
    <!-- Async font CSS - `media="print"` makes the browser fetch it without
         blocking first paint (print styles don't block rendering); onload
         flips it to `all` and the fonts swap in. Saves ~1s of mobile
         render-block vs a plain stylesheet link; display=swap keeps text
         visible on the system stack meanwhile. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      />
    </noscript>

    <!-- ── Google Analytics 4 ──────────────────────────────────────────
         Replace G-XXXXXXXXXX with the Measurement ID from
         analytics.google.com (Admin → Data streams → Web). Guarded so it
         loads ONLY on the production domain - dev / preview traffic never
         pollutes the stats - and no-ops entirely until the real ID is set.
         SPA route changes are tracked by GA4's "Enhanced measurement"
         (History events; on by default in the data-stream settings). -->
    <script>
      (function () {
        var GA_ID = "G-VJDHRS3Z92";
        var h = location.hostname;
        if (h !== "futsal-turniri.com" && h !== "www.futsal-turniri.com") return;
        if (GA_ID.indexOf("XXXX") !== -1) return; /* not configured yet */
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", GA_ID);
      })();
    </script>

    <!-- ── PWA / Add to Home Screen ─────────────────────────────────────
         Installable web app metadata. With the manifest below, Chrome
         (Android/desktop) shows an "Install app" option in the URL bar;
         Safari (iOS) supports "Add to Home Screen" via the share menu.
         The four apple-mobile-web-app-* meta tags are iOS-only, since
         iOS Safari predates and ignores parts of the W3C manifest.

         When launched from the home-screen icon the app runs in
         "standalone" mode (no Safari/Chrome chrome around the page),
         which is what makes it feel like a native app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="Futsal Turniri" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Futsal Turniri" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Futsal turniri u Hrvatskoj - prati turnire na jednom mjestu, pogledaj raspored, rezultate uživo i statistiku strijelaca." />

    <!-- Open Graph / link previews. og:image must be a raster format
         (PNG/JPEG) - WhatsApp and Facebook crawlers silently drop SVG
         and the share renders without a thumbnail. The app icons are
         rendered from public/logo/mark-green.svg via
         scripts/gen-pwa-icons.mjs and checked into public/.
         og:image:secure_url and the explicit dimensions help platforms
         cache and lay out the card correctly.

         Per-page overrides (poster art on tournament detail, avatar on
         profile) are set client-side via useDocumentHead and take
         precedence over these defaults. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Futsal turniri" />
    <meta property="og:title" content="Futsal turniri" />
    <meta property="og:description" content="Futsal turniri u Hrvatskoj - prati turnire na jednom mjestu, pogledaj raspored, rezultate uživo i statistiku strijelaca." />
    <!-- og:url is the canonical URL of this page. Facebook's scraper flags
         it as a missing required property when absent. The static value
         here is the root URL - useDocumentHead overrides it per-route
         (tournament/profile pages) for JS-aware crawlers; the
         /api/preview/* SSR fallback emits a route-specific og:url too. -->
    <meta property="og:url" content="https://futsal-turniri.com/" />
    <!-- Branded 1200×630 landscape card (green mark + "Futsal Turniri" +
         domain), rendered by the backend so the brand stays in one place.
         Per-page overrides (tournament poster, profile avatar) are set
         client-side via useDocumentHead and by the /api/preview/* SSR
         fallback for non-JS crawlers. -->
    <meta property="og:image" content="https://futsal-turniri.com/api/og/default.png" />
    <meta property="og:image:secure_url" content="https://futsal-turniri.com/api/og/default.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Futsal Turniri - futsal-turniri.com" />
    <meta property="og:locale" content="hr_HR" />
    <!-- fb:app_id is "recommended" by Facebook but not strictly required
         - its absence triggers a warning in the FB sharing debugger but
         doesn't block previews from rendering. To silence the warning,
         create a Facebook App at https://developers.facebook.com/apps
         and replace YOUR_APP_ID below (then uncomment the line). An
         empty Facebook App with just a name + contact email is enough.
         <meta property="fb:app_id" content="YOUR_APP_ID" /> -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://futsal-turniri.com/api/og/default.png" />

    <title>Futsal Turniri - futsal-turniri.com</title>

    <!-- ── schema.org JSON-LD ─────────────────────────────────────────────
         Two records keyed off the site root, picked up by Googlebot on
         every page (the SPA navigates client-side but these stay in the
         document head). Reasons they're worth their weight in bytes:

         • WebSite + potentialAction=SearchAction enables the sitelinks
           search box for branded "futsal turniri" queries - a search input
           rendered directly inside the Google result that targets our
           /tournaments?q= endpoint. Google ignores this on small sites
           it doesn't recognise yet, but the markup is the prerequisite
           and costs us nothing.

         • Organization gives Google's knowledge graph a canonical logo,
           name, and homepage URL - used for the favicon/brand chip next
           to results and for Google Business-style entity panels.

         Per-route Event/Person JSON-LD is emitted from the backend SSR
         preview controllers (for non-JS crawlers) and via useDocumentHead
         (for Googlebot rendering the SPA). This block is only the
         site-level scaffolding. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Futsal turniri",
      "alternateName": "futsal-turniri.com",
      "url": "https://futsal-turniri.com/",
      "inLanguage": "hr",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://futsal-turniri.com/turniri?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Futsal turniri",
      "alternateName": "futsal-turniri.com",
      "url": "https://futsal-turniri.com/",
      "logo": "https://futsal-turniri.com/futsal-turniri-symbol.png",
      "sameAs": []
    }
    </script>

    <!-- Reserve the vertical-scrollbar gutter unconditionally. Without this
         rule a route swap from a short page (Kalendar - fits in viewport,
         no scrollbar) to a tall page (Kreiraj turnir - scrollbar appears)
         shifts every centred element ~17px left, which the user spots as a
         jarring layout jump. `scrollbar-gutter: stable` keeps the gutter
         present always, even when content fits, so the content area's
         width is identical between routes. Falls back gracefully on older
         browsers (no jump, just the original behaviour). -->
    <style>
      html { scrollbar-gutter: stable; }
      /* Pitch theme - the live/now pulsing dot animation. Used by the
         `PulseDot`, `StatusChip` (live variant), `FilterChip` (with
         pulse=true), and the live navbar item. Defining it as a global
         keyframe keeps it usable from inline `css={{ animation }}`
         attributes without per-component <style> injection. */
      @keyframes pitchPulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.4; }
      }
      /* Live-tournament map marker - expanding "radar ping" ring that
         emanates from the pin head. Rendered inside the Leaflet DivIcon
         HTML (see MapPage.makePinIcon) on tournaments with a live match
         so they visibly stand out from upcoming/finished pins. */
      @keyframes mapLivePing {
        0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.7; }
        70%  { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
      }
      .map-live-ping {
        position: absolute;
        left: 16px;            /* pin head centre x (32px-wide icon) */
        top: 12px;             /* pin head centre y */
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(220, 38, 38, 0.55);
        animation: mapLivePing 1.6s ease-out infinite;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
