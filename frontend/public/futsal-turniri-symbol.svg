<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="800"
   viewBox="290 150 620 740"
   role="img"
   aria-labelledby="title desc"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <title id="title">Bela Turniri symbol logo</title>
  <desc id="desc">Symbol-only logo for Bela Turniri using the four Bela/Hungarian card suits: herc, pik, žir and kara/bundeva.</desc>
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3a2d"/>
      <stop offset="0.55" stop-color="#e31916"/>
      <stop offset="1" stop-color="#b80d0d"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79c844"/>
      <stop offset="0.52" stop-color="#2f8c38"/>
      <stop offset="1" stop-color="#0f5f2d"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff36a"/>
      <stop offset="0.48" stop-color="#ffc928"/>
      <stop offset="1" stop-color="#d89108"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd65c"/>
      <stop offset="0.55" stop-color="#d99613"/>
      <stop offset="1" stop-color="#9f5b08"/>
    </linearGradient>
    <linearGradient id="brownGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b66b15"/>
      <stop offset="0.55" stop-color="#81410e"/>
      <stop offset="1" stop-color="#4e2308"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <pattern id="capHatch" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0 L0 30" stroke="#5b2a0b" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    </pattern>
    <clipPath id="acornCapClip">
      <path d="M510 644 C518 584 682 584 690 644 L690 694 C645 676 555 676 510 694 Z"/>
    </clipPath>
  </defs>

  <g stroke-linejoin="round" stroke-linecap="round" filter="url(#softShadow)">
    <!-- Herc / heart -->
    <g id="herc">
      <path d="M600 402 C586 374 510 332 498 264 C487 199 556 173 600 225 C644 173 713 199 702 264 C690 332 614 374 600 402 Z"
            fill="url(#redGrad)" stroke="#321005" stroke-width="13"/>
      <path d="M600 390 C590 360 533 322 523 270 C517 235 540 208 571 212 C583 214 593 220 600 232 Z"
            fill="#ffffff" opacity="0.08"/>
      <path d="M600 225 C644 173 713 199 702 264 C690 332 614 374 600 402 Z"
            fill="#ff4b3e" opacity="0.22"/>
    </g>

    <!-- Pik / green leaf -->
    <g id="pik">
      <path d="M448 342 C375 395 323 480 348 557 C361 599 396 609 426 590 C436 584 443 574 448 563 C453 574 460 584 470 590 C501 609 535 599 549 557 C574 480 521 395 448 342 Z"
            fill="url(#greenGrad)" stroke="#052b12" stroke-width="13"/>
      <path d="M448 548 L448 625" fill="none" stroke="#062d13" stroke-width="12"/>
      <path d="M418 625 L478 625 L468 585 L428 585 Z" fill="#1e7a33" stroke="#052b12" stroke-width="9"/>
      <path d="M448 381 L448 584" fill="none" stroke="#0a4f20" stroke-width="8"/>
      <path d="M448 470 C421 454 395 435 376 412" fill="none" stroke="#0a4f20" stroke-width="7"/>
      <path d="M448 520 C418 501 391 479 369 454" fill="none" stroke="#0a4f20" stroke-width="7"/>
      <path d="M448 474 C475 459 499 439 516 415" fill="none" stroke="#0a4f20" stroke-width="7"/>
      <path d="M448 522 C479 503 505 480 527 455" fill="none" stroke="#0a4f20" stroke-width="7"/>
      <path d="M371 553 C356 490 392 423 448 370 C422 428 402 492 411 578 C395 579 381 571 371 553 Z"
            fill="#ffffff" opacity="0.08"/>
    </g>

    <!-- Kara / bundeva bell -->
    <g id="kara" transform="translate(678 336)">
      <path d="M112 0 C97 0 88 10 88 29 C47 53 26 103 26 170 C26 204 5 213 0 226 C42 260 180 260 222 226 C217 213 196 204 196 170 C196 103 175 53 134 29 C134 10 127 0 112 0 Z"
            fill="url(#yellowGrad)" stroke="#321005" stroke-width="12"/>
      <path d="M105 5 C88 50 83 117 84 242 C46 238 18 229 5 222 C28 211 30 194 30 165 C30 103 50 57 91 29 C90 16 95 8 105 5 Z"
            fill="#fff87f" opacity="0.25"/>
      <path d="M112 0 C127 0 134 10 134 29 C175 53 196 103 196 170 C196 204 217 213 222 226 C200 243 156 253 112 253 Z"
            fill="#bf7a00" opacity="0.14"/>
      <path d="M25 184 C64 202 158 202 197 184 L207 217 C165 244 57 244 15 217 Z"
            fill="#c82b1c" stroke="#321005" stroke-width="8"/>
      <path d="M32 190 C72 205 151 205 190 190" fill="none" stroke="#ffb22f" stroke-width="4" opacity="0.55"/>
      <g fill="#188436" stroke="#052b12" stroke-width="4">
        <path d="M42 199 L58 220 L72 199 Z"/>
        <path d="M76 202 L92 224 L106 202 Z"/>
        <path d="M111 203 L127 224 L141 202 Z"/>
        <path d="M147 202 L163 222 L177 200 Z"/>
      </g>
      <circle cx="111" cy="256" r="23" fill="#6cae22" stroke="#321005" stroke-width="9"/>
    </g>

    <!-- Žir / acorn -->
    <g id="zir">
      <path d="M600 667 C545 669 508 710 516 769 C524 827 600 861 600 861 C600 861 676 827 684 769 C692 710 655 669 600 667 Z"
            fill="url(#goldGrad)" stroke="#321005" stroke-width="13"/>
      <path d="M548 682 C520 713 516 752 526 786 C535 817 568 839 600 856 C579 802 566 743 575 675 Z"
            fill="#fff06d" opacity="0.22"/>
      <path d="M600 667 C655 669 692 710 684 769 C676 827 600 861 600 861 Z" fill="#8e5306" opacity="0.16"/>
      <path d="M510 644 C518 584 682 584 690 644 L690 694 C645 676 555 676 510 694 Z"
            fill="url(#brownGrad)" stroke="#321005" stroke-width="13"/>
      <path d="M510 644 C518 584 682 584 690 644 L690 694 C645 676 555 676 510 694 Z"
            fill="url(#capHatch)" clip-path="url(#acornCapClip)" opacity="0.7"/>
      <path d="M550 630 C580 607 620 607 650 630" fill="none" stroke="#bd7a16" stroke-width="8" opacity="0.55"/>
      <path d="M585 588 C588 559 612 559 615 588 L614 612 L586 612 Z"
            fill="url(#brownGrad)" stroke="#321005" stroke-width="10"/>
    </g>
  </g>
</svg>
