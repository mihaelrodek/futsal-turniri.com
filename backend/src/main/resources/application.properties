# --- General ---
# spring.application.name is ignored by Quarkus; remove it
# Dev listens on 8087 (Vite proxies /api here). PROD listens on 8085 to
# match the Caddy reverse_proxy target (backend:8085) + the Dockerfile
# EXPOSE - keep these three in sync or every /api request 502s in prod.
quarkus.http.port=8087
%prod.quarkus.http.port=8085
quarkus.http.root-path=/api
# --- CORS ---
# Prod: explicit allow-list set via CORS_ORIGINS env var, e.g.
#   CORS_ORIGINS=https://futsal-turniri.com,https://www.futsal-turniri.com
# Dev: allow any origin so `vite --host` on a phone, a different Vite port,
# or 127.0.0.1 vs localhost all work without re-config. Safe because the API
# uses no credentials/cookies - and only ever runs locally in dev profile.
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5175}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept,Origin,X-Requested-With
# Dev CORS: pin to the Vite dev server origins (5175 default + 5173 fallback)
# explicitly. The previous wildcard regex allowed any local site to call this
# API with the developer's Firebase token in an Authorization header - a
# defense-in-depth gap flagged by the security audit. Add more local URLs
# here if your dev workflow uses them.
%dev.quarkus.http.cors.origins=http://localhost:5175,http://127.0.0.1:5175,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5181,http://127.0.0.1:5181
# --- File upload limits (Quarkus) ---
quarkus.http.body.handle-file-uploads=true
# Where RESTEasy Reactive stores temp uploads. Absolute path inside /tmp so
# the non-root container user can always write here, regardless of WORKDIR
# ownership. Files are deleted after each request anyway (see below).
quarkus.http.body.uploads-directory=/tmp/quarkus-uploads
# Auto-delete after request ends (you read the file during request)
quarkus.http.body.delete-uploaded-files-on-end=true
# Max total body size (adjust as needed). Sized for the largest upload -
# stream-ad videos (StorageService.MAX_AD_VIDEO_BYTES = 50M) + a little
# multipart overhead. Per-kind caps in StorageService enforce the real limits
# (posters 6M, avatars 5M), so a random endpoint can't actually be flooded.
quarkus.http.limits.max-body-size=60M
# --- Connection backstop (DoS) ---
# Hard ceiling on concurrent connections (HTTP + WebSocket) so an anonymous
# connection flood - e.g. thousands of idle /ws/live sockets - can't exhaust
# file descriptors / heap and crash the JVM. Set generously ABOVE any realistic
# legitimate peak for this site (venue crowds share a NAT IP, so this is a
# global not per-IP cap); excess connections are rejected, not queued.
%prod.quarkus.http.limits.max-connections=5000
# --- MinIO (flattened; read via @ConfigProperty) ---
# Required env vars in prod (no defaults on purpose): MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9012}
minio.accessKey=${MINIO_ROOT_USER}
minio.secretKey=${MINIO_ROOT_PASSWORD}
minio.bucket=${MINIO_BUCKET:tournaments}
minio.publicBaseUrl=${MINIO_PUBLIC_BASE_URL:http://localhost:9012}
# --- Dev services ---
# Disabled: we run our own Postgres + MinIO via docker-compose on fixed ports.
# DevServices would otherwise spin up a throwaway Postgres and you'd look at an
# empty DB while your real data sits in the compose container.
quarkus.devservices.enabled=false
# --- Firebase Auth (OIDC) ---
# Firebase issues standard OIDC ID tokens signed with rotating Google keys.
# Set FIREBASE_PROJECT_ID via env var when deploying. No client secret needed -
# the backend only verifies tokens, it never issues them.
quarkus.oidc.auth-server-url=https://securetoken.google.com/${FIREBASE_PROJECT_ID:futsal-turniri}
quarkus.oidc.client-id=${FIREBASE_PROJECT_ID:futsal-turniri}
quarkus.oidc.token.principal-claim=email
quarkus.oidc.application-type=service
# OIDC enabled: the backend verifies Firebase ID tokens on every
# @Authenticated endpoint (e.g. /user/me/sync, POST /tournaments). The
# Firebase project must exist and FIREBASE_PROJECT_ID must match it
# (defaults to `futsal-turniri` above). Setting this to `false` lets the
# app boot without Firebase - public/read endpoints still work, but every
# @Authenticated endpoint then returns 401.
quarkus.oidc.tenant-enabled=true
# Map the Firebase custom-claim "role" into Quarkus SecurityIdentity roles
# (used by @RolesAllowed). A user with no `role` claim simply has no roles.
quarkus.oidc.roles.role-claim-path=role
# --- Auth policies ---
# Lazy auth: OIDC is invoked only when an endpoint declares @Authenticated.
# All endpoints without that annotation stay fully public - anonymous users
# can browse, view, and read everything without ever hitting Firebase.
quarkus.http.auth.proactive=false
# --- Datasource ---
# Required env vars in prod (no defaults on purpose): POSTGRES_USER, POSTGRES_PASSWORD.
# POSTGRES_JDBC_URL lets prod point at any host/port/db without a rebuild;
# the localhost:5436 default matches the dev docker-compose so `quarkus:dev`
# works out of the box.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5436/futsal-turniri.com}
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}
# Connection-pool sizing. Defaults are conservative; tune up only after you
# know your prod Postgres connection budget. Leak detection logs a warning
# when a connection is held for >10s without being closed (helpful while
# we have no integration tests).
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=10S
quarkus.datasource.jdbc.idle-removal-interval=5M
quarkus.datasource.jdbc.leak-detection-interval=10S
# --- Dev-only fallbacks ---
# These match docker-compose defaults so `./mvnw quarkus:dev` works without
# needing env vars exported in your shell. Prod still fails fast on missing env.
%dev.quarkus.datasource.username=${POSTGRES_USER:mrodek}
%dev.quarkus.datasource.password=${POSTGRES_PASSWORD:1234}
%dev.minio.accessKey=${MINIO_ROOT_USER:minio}
%dev.minio.secretKey=${MINIO_ROOT_PASSWORD:minio12345}
%dev.minio.bucket=${MINIO_BUCKET:futsal-posters}
# --- Liquibase ---
# Migrations run automatically on every backend startup. The change-log path
# is build-time-fixed: Quarkus scans it during the build to register all
# referenced changesets as runtime resources. If this section disappears
# (file truncation, accidental edit, etc.) Liquibase silently no-ops and
# the database ends up empty - exactly the bug we hit on the first deploy.
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/changelog-master.xml
# --- Web Push (VAPID) ---
# VAPID keypair used to sign Web Push payloads. Frontend fetches the public
# key via /api/push/public-key when subscribing; the private key signs every
# outbound push request. Generate once with the snippet in DEPLOY.md and
# never rotate without a corresponding mass-unsubscribe of existing
# subscriptions (browsers reject pushes signed with a different key).
#
# Subject must be a mailto:/https: URI that identifies who owns the
# pushes - most push services log this in their abuse pipeline.
push.vapid.public-key=${VAPID_PUBLIC_KEY:}
push.vapid.private-key=${VAPID_PRIVATE_KEY:}
push.vapid.subject=${VAPID_SUBJECT:mailto:mihael.rodek1@gmail.com}

# --- Email (Brevo SMTP relay) ---
# Transactional email for tournament notifications. Uses Brevo's SMTP relay by
# default; any SMTP provider works by overriding host/port. When login/key are
# empty the mailer still boots but EmailService.isReady() is false, so no mail
# is attempted (dev / not-yet-configured). Get the SMTP login + key from the
# Brevo dashboard → SMTP & API → SMTP. Add SPF + DKIM DNS records for
# futsal-turniri.com there too, or mail lands in spam.
# TEMPORARILY DISABLED - username/password with an empty-string default crash
# the boot (SmallRye Config treats "" as a missing value:
# "Failed to load config value ... quarkus.mailer.username"). Re-enable by
# uncommenting the two credential lines once MAIL_SMTP_LOGIN/MAIL_SMTP_KEY are
# set in .env.prod; EmailService.isReady() stays false while they're absent,
# so no mail is attempted either way.
quarkus.mailer.from=${MAIL_FROM:Futsal Turniri <obavijesti@futsal-turniri.com>}
quarkus.mailer.host=${MAIL_SMTP_HOST:smtp-relay.brevo.com}
quarkus.mailer.port=${MAIL_SMTP_PORT:587}
#quarkus.mailer.username=${MAIL_SMTP_LOGIN}
#quarkus.mailer.password=${MAIL_SMTP_KEY}
quarkus.mailer.start-tls=REQUIRED
# Public base URL used to build links (unsubscribe hint / tournament page) in
# email bodies. Reuses the same value the OG/preview layer already relies on.
app.mail.base-url=${APP_PUBLIC_BASE_URL:http://localhost:5174}
# --- Open Graph / link previews ---
# Default og:image URL used by TournamentPreviewController and
# ProfilePreviewController when the tournament has no poster (or the profile
# has no avatar). Must be an ABSOLUTE URL - bots fetch it directly without
# resolving relative paths against the page URL. Defaults to deriving from
# APP_PUBLIC_BASE_URL so prod and dev stay in sync without a separate env var.
# Branded 1200×630 "logo + text" card rendered by BrandOgController. Used as
# the default link-preview image for the whole site (homepage, generic pages)
# and as the fallback when a tournament has no poster / a profile no avatar.
app.default-og-image=${APP_DEFAULT_OG_IMAGE:${APP_PUBLIC_BASE_URL:http://localhost:5174}/api/og/default.png}
# --- API docs ---
# Swagger UI is off in prod by default; OpenAPI JSON at /q/openapi is on by
# default and would otherwise leak the full admin/auth-required schema to
# anyone who hits it. We don't need either in production for now - the
# frontend is hand-written, not generated from the schema. Flip these on
# (or override per-host) if/when you want to publish the schema.
%prod.quarkus.smallrye-openapi.enable=false
%prod.quarkus.swagger-ui.always-include=false
# --- Logging ---
# JSON logs in prod so a log aggregator (Loki / Datadog / etc.) can ingest
# them without regex parsing. Plain console in dev for readability.
# %prod.quarkus.log.console.json=true   # enable when shipping to an aggregator
quarkus.log.level=INFO
quarkus.log.category."hr.mrodek".level=INFO
%dev.quarkus.log.category."hr.mrodek".level=DEBUG
